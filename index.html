<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://millinoxx.com/img/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Millinoxx Engineering & Consultancy - Premier international recruitment, manpower outsourcing, and engineering consultancy firm headquartered in Hyderabad, India." />
    <title>Millinoxx Engineering & Consultancy Pvt. Ltd.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script type="text/javascript">
      function googleTranslateElementInit() {
        const init = () => {
          const el = document.getElementById('google_translate_element');
          if (el) {
            new google.translate.TranslateElement({
              pageLanguage: 'en',
              includedLanguages: 'ar,zh-CN,fr,de,hi,ml,ru,es,ta,te',
              layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
              autoDisplay: false
            }, 'google_translate_element');
          } else {
            setTimeout(init, 100);
          }
        };
        init();
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <style>
      html { scroll-behavior: smooth; }
      body { font-family: 'Inter', sans-serif; }
      /* Hide the floating Google top bar and restore body position */
      .goog-te-banner-frame.skiptranslate,
      .goog-te-banner-frame { display: none !important; }
      body { top: 0 !important; }
      
      /* Style the Google Translate Simple Widget to look like a premium white dropdown */
      .goog-te-gadget-simple {
        background-color: #ffffff !important;
        border: 1px solid #ffffff !important;
        padding: 3px 8px !important;
        border-radius: 4px !important;
        display: inline-flex !important;
        align-items: center !important;
        cursor: pointer !important;
        gap: 6px !important;
        font-family: 'Inter', sans-serif !important;
        text-decoration: none !important;
      }
      
      /* Style spans inside the simple widget */
      .goog-te-gadget-simple span {
        color: #0A1628 !important;
        font-size: 12px !important;
        font-weight: 500 !important;
        font-family: 'Inter', sans-serif !important;
        text-decoration: none !important;
        display: inline-block !important;
        vertical-align: middle !important;
      }
      
      /* Clean up borders and icons inside simple widget */
      .goog-te-gadget-simple img {
        display: inline-block !important;
        vertical-align: middle !important;
      }
      
      /* Style the popup translation menu/frame */
      .goog-te-menu-frame {
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15) !important;
        border: 1px solid #e2e8f0 !important;
        border-radius: 8px !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
